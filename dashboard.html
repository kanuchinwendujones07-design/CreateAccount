<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amplyfi | Task Center</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{background:#0f172a; color:#fff; padding: 20px; padding-bottom: 80px;}

        h2 { font-weight: 800; margin-bottom: 25px; font-size: 24px; color: #4f46e5; text-align: center; }

        /* --- TASK CARD STYLING --- */
        #taskContainer { display: grid; gap: 15px; max-width: 500px; margin: 0 auto; }
        
        .task-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            transition: 0.2s;
        }

        /* ICON BOX */
        .icon-box {
            width: 55px;
            height: 55px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px; /* Larger icons */
            flex-shrink: 0;
        }

        /* OFFICIAL BRAND COLORS - FORCED */
        .brand-whatsapp { color: #25D366 !important; }
        .brand-tiktok { color: #ff0050 !important; }
        .brand-facebook { color: #1877F2 !important; }
        .brand-youtube { color: #FF0000 !important; }
        .brand-instagram { color: #E4405F !important; }
        .brand-x-twitter { color: #ffffff !important; }
        .brand-globe { color: #4f46e5 !important; }
        .brand-default { color: #fbbf24 !important; } /* Gold for generic tasks */

        .task-info { flex: 1; }
        .task-info h4 { font-size: 16px; font-weight: 600; color: #f8fafc; margin-bottom: 4px; }
        .reward-tag {
            color: #22c55e;
            font-size: 14px;
            font-weight: 800;
            display: block;
        }

        .btn-start {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }

        .badge-hot {
            position: absolute;
            top: 0;
            right: 0;
            background: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: 900;
            padding: 3px 12px;
            border-bottom-left-radius: 12px;
        }

        .loading-state { text-align: center; margin-top: 50px; color: #64748b; }
    </style>
</head>
<body>

    <h2><i class="fa-solid fa-bolt-lightning"></i> Available Tasks</h2>

    <div id="taskContainer">
        <div class="loading-state">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 30px; margin-bottom: 10px;"></i>
            <p>Loading your tasks...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAP5BADrbyPaeR8WYVzZToWabxeVBDTo5I",
            authDomain: "client-b83b3.firebaseapp.com",
            projectId: "client-b83b3",
            databaseURL: "https://client-b83b3-default-rtdb.firebaseio.com/",
            appId: "1:653007015347:web:7a43260aab8bc2246f4fc6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // --- THE ICON MAP (NOW WITH FA-BRANDS PREFIX) ---
        const brandIcons = {
            'whatsapp': 'fa-brands fa-whatsapp',
            'tiktok': 'fa-brands fa-tiktok',
            'facebook': 'fa-brands fa-facebook',
            'youtube': 'fa-brands fa-youtube',
            'instagram': 'fa-brands fa-instagram',
            'x-twitter': 'fa-brands fa-x-twitter',
            'globe': 'fa-solid fa-globe'
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadTasks(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        function loadTasks(uid) {
            const taskRef = ref(db, 'activeTasks');
            const completedRef = ref(db, `users/${uid}/completedTasks`);

            onValue(completedRef, (cSnap) => {
                const completed = cSnap.val() || {};

                onValue(taskRef, (tSnap) => {
                    const container = document.getElementById('taskContainer');
                    container.innerHTML = "";
                    let counter = 0;

                    tSnap.forEach((child) => {
                        const data = child.val();
                        const tid = child.key;

                        // Hide if finished or full
                        if (completed[tid] || (data.completed >= data.limit)) return;

                        counter++;
                        
                        // Set Icon & Color logic
                        const iconClass = brandIcons[data.platform] || 'fa-solid fa-star';
                        const colorClass = data.platform ? `brand-${data.platform}` : 'brand-default';
                        const hotBadge = data.reward >= 50 ? `<div class="badge-hot">🔥 HOT</div>` : '';

                        container.innerHTML += `
                            <div class="task-card">
                                ${hotBadge}
                                <div class="icon-box">
                                    <i class="${iconClass} ${colorClass}"></i>
                                </div>
                                <div class="task-info">
                                    <h4>${data.title}</h4>
                                    <span class="reward-tag">₦${data.reward}</span>
                                </div>
                                <button class="btn-start" onclick="window.location.href='submit-proof.html?id=${tid}&name=${encodeURIComponent(data.title)}&reward=${data.reward}&link=${encodeURIComponent(data.link)}'">
                                    Start
                                </button>
                            </div>
                        `;
                    });

                    if (counter === 0) {
                        container.innerHTML = `<div class="loading-state"><i class="fa-solid fa-face-smile"></i><p>No new tasks available!</p></div>`;
                    }
                });
            });
        }
    </script>
</body>
</html>
