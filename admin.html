<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amplyfi | Earn Money</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{background:#0f172a; color:#fff; padding: 20px; padding-bottom: 80px;}

        h2 { font-weight: 800; margin-bottom: 20px; font-size: 22px; color: #4f46e5; }

        /* --- TASK CARD STYLING --- */
        #taskContainer { display: grid; gap: 15px; }
        
        .task-card {
            background: #1e293b;
            padding: 18px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        .task-card:active { transform: scale(0.97); }

        /* ICON BOX */
        .icon-box {
            width: 55px;
            height: 55px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        /* OFFICIAL BRAND COLORS */
        .brand-whatsapp { color: #25D366 !important; }
        .brand-tiktok { color: #ff0050 !important; }
        .brand-facebook { color: #1877F2 !important; }
        .brand-youtube { color: #FF0000 !important; }
        .brand-instagram { color: #E4405F !important; }
        .brand-x-twitter { color: #ffffff !important; }
        .brand-globe { color: #4f46e5 !important; }

        .task-info { flex: 1; }
        .task-info h4 { font-size: 15px; font-weight: 600; color: #f8fafc; margin-bottom: 4px; }
        .task-info p { font-size: 13px; color: #94a3b8; font-weight: 500; }

        .reward-tag {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
        }

        .btn-start {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        /* "HOT" BADGE FOR HIGH PAYING TASKS */
        .badge-hot {
            position: absolute;
            top: 0;
            right: 0;
            background: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 10px;
            border-bottom-left-radius: 10px;
            text-transform: uppercase;
        }

        /* EMPTY STATE */
        .empty-tasks { text-align: center; padding: 50px 20px; color: #64748b; }
        .empty-tasks i { font-size: 40px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <h2>Available Tasks</h2>

    <div id="taskContainer">
        <div class="empty-tasks">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Fetching new tasks...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAP5BADrbyPaeR8WYVzZToWabxeVBDTo5I",
            authDomain: "client-b83b3.firebaseapp.com",
            projectId: "client-b83b3",
            databaseURL: "https://client-b83b3-default-rtdb.firebaseio.com/",
            appId: "1:653007015347:web:7a43260aab8bc2246f4fc6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // Map platform to FontAwesome class
        const brandIcons = {
            'whatsapp': 'fab fa-whatsapp',
            'tiktok': 'fab fa-tiktok',
            'facebook': 'fab fa-facebook',
            'youtube': 'fab fa-youtube',
            'instagram': 'fab fa-instagram',
            'x-twitter': 'fab fa-x-twitter',
            'globe': 'fas fa-globe'
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadUserTasks(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        function loadUserTasks(uid) {
            const taskRef = ref(db, 'activeTasks');
            const userCompletedRef = ref(db, `users/${uid}/completedTasks`);

            // Fetch completed tasks first to hide them
            onValue(userCompletedRef, (completedSnap) => {
                const completedTasks = completedSnap.val() || {};

                onValue(taskRef, (taskSnap) => {
                    const container = document.getElementById('taskContainer');
                    container.innerHTML = "";
                    let hasTasks = false;

                    taskSnap.forEach((child) => {
                        const data = child.val();
                        const taskId = child.key;

                        // Skip if user already finished this task OR slots are full
                        if (completedTasks[taskId] || data.completed >= data.limit) return;

                        hasTasks = true;
                        const iconClass = brandIcons[data.platform] || 'fas fa-tasks';
                        const colorClass = `brand-${data.platform}`;
                        
                        // Add "Hot" badge if reward > 50
                        const hotBadge = data.reward > 50 ? `<div class="badge-hot">Hot</div>` : '';

                        container.innerHTML += `
                            <div class="task-card">
                                ${hotBadge}
                                <div class="icon-box">
                                    <i class="${iconClass} ${colorClass}"></i>
                                </div>
                                <div class="task-info">
                                    <h4>${data.title}</h4>
                                    <p class="reward-tag">₦${data.reward}</p>
                                </div>
                                <button class="btn-start" onclick="window.location.href='submit-proof.html?id=${taskId}&name=${encodeURIComponent(data.title)}&reward=${data.reward}&link=${encodeURIComponent(data.link)}'">
                                    Start
                                </button>
                            </div>
                        `;
                    });

                    if (!hasTasks) {
                        container.innerHTML = `<div class="empty-tasks"><i class="fas fa-check-circle"></i><p>All tasks completed! Check back later.</p></div>`;
                    }
                });
            });
        }
    </script>
</body>
</html>
